name: CI TokoKita UAS Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config -q

      - name: Build Docker image
        run: docker build -t tokokita-cloud-cicd:v1 .

      - name: Start web and database services
        run: docker compose --env-file .env.example up -d --build

      - name: Wait for application health check
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8080/health.php; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run automated tests
        run: chmod +x tests/test_app.sh && ./tests/test_app.sh

      - name: Show Docker Compose status
        if: always()
        run: docker compose --env-file .env.example ps

      - name: Show service logs on failure
        if: failure()
        run: docker compose --env-file .env.example logs --no-color

      - name: Stop containers
        if: always()
        run: docker compose --env-file .env.example down
